name: Label PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Auto-label by changed files
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # sync-labels: true will REMOVE labels that no longer match;
          # leave false so manually-applied labels are preserved.
          sync-labels: false